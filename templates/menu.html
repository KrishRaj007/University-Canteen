<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu — Campus Canteen</title>
<link href="https://fonts.googleapis.com/css2?family=Montenegrin+Gothic+One&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script>
  (function () {
    const savedTheme = localStorage.getItem('customerTheme') || 'light';
    document.documentElement.dataset.theme = savedTheme;
  })();
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --midnight: #007979;
    --navy: #24b1b1;
    --soft-blue: #ffe0c5;
    --pale-blue: #fff0e4;

    --saffron: var(--soft-blue);
    --deep: var(--midnight);
    --card: #fff0e4;
    --card2: #ffe0c5;
    --gold: #007979;
    --mint: #24b1b1;
    --text: #083f3f;
    --muted: #4f7777;
    --border: rgba(0, 121, 121, 0.18);
    --ink: #083f3f;
    --cream: #fff0e4;
    --page-bg: linear-gradient(135deg, var(--pale-blue) 0%, var(--soft-blue) 100%);
    --card-bg: rgba(255, 240, 228, 0.92);
    --image-bg: rgba(255, 224, 197, 0.55);
    --input-bg: #fff;
    --nav-text: rgba(255, 240, 228, 0.82);
  }
  [data-theme="dark"] {
    --midnight: #000000;
    --navy: #233d4d;
    --soft-blue: #fe7f2d;
    --pale-blue: #aecf0f;
    --saffron: var(--soft-blue);
    --deep: var(--midnight);
    --card: var(--navy);
    --card2: #2e5065;
    --gold: var(--pale-blue);
    --mint: var(--soft-blue);
    --text: #f5f7fb;
    --muted: #aeb9c4;
    --border: rgba(174, 207, 15, 0.22);
    --ink: #f5f7fb;
    --cream: #233d4d;
    --page-bg: linear-gradient(135deg, var(--midnight) 0%, var(--navy) 100%);
    --card-bg: rgba(35, 61, 77, 0.94);
    --image-bg: rgba(0, 0, 0, 0.18);
    --input-bg: #172936;
    --nav-text: rgba(245, 247, 251, 0.82);
  }
  body { font-family: 'Poppins', sans-serif; background: var(--page-bg); color: var(--text); min-height: 100vh; }
  /* NAV */
  nav {
    background: linear-gradient(90deg, var(--midnight) 0%, var(--navy) 100%);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .nav-brand { font-family: 'Montenegrin Gothic One', 'Poppins', sans-serif; font-size: 22px; font-weight: 400; }
  .nav-brand span { color: var(--pale-blue); }
  .nav-actions { display: flex; align-items: center; gap: 16px; }
  .nav-link {
    color: var(--nav-text); font-size: 14px; font-weight: 500;
    text-decoration: none; padding: 6px 12px; border-radius: 8px;
    transition: all 0.2s;
  }
  .nav-link:hover { color: #fff; background: rgba(255,255,255,0.12); }
  .theme-toggle {
    border: 1px solid rgba(255,255,255,0.22);
    background: rgba(255,255,255,0.12);
    color: #fff;
    border-radius: 999px;
    padding: 7px 12px;
    cursor: pointer;
    font-family: 'Poppins', sans-serif;
    font-size: 13px;
    font-weight: 600;
    min-width: 86px;
    transition: background 0.2s, border-color 0.2s;
  }
  .theme-toggle:hover { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.38); }
  .cart-btn {
    background: linear-gradient(90deg, var(--soft-blue) 0%, var(--pale-blue) 100%); color: var(--midnight); border: none;
    padding: 8px 18px; border-radius: 10px; font-weight: 600;
    cursor: pointer; display: flex; align-items: center; gap: 8px;
    font-family: 'Poppins', sans-serif; font-size: 14px; transition: opacity 0.2s;
  }
  .cart-btn:hover { opacity: 0.9; }
  .cart-count {
    background: var(--midnight); color: var(--pale-blue);
    border-radius: 50%; width: 20px; height: 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
  }
  /* HERO */
  .hero {
    padding: 40px 32px 24px;
    max-width: 1200px; margin: 0 auto;
  }
  .hero h1 {
    font-family: 'Poppins', sans-serif; font-size: 36px;
    font-weight: 800; line-height: 1.2;
  }
  .hero h1 span { color: var(--midnight); }
  .hero p { color: var(--muted); margin-top: 8px; font-size: 16px; }
  /* CATEGORY FILTER */
  .filters {
    max-width: 1200px; margin: 0 auto;
    padding: 0 32px 24px;
    display: flex; gap: 8px; overflow-x: auto;
    scrollbar-width: none;
  }
  .filter-btn {
    padding: 8px 18px; border-radius: 20px;
    border: 1.5px solid var(--border);
    background: transparent; color: var(--muted);
    font-size: 13px; font-weight: 500; cursor: pointer;
    white-space: nowrap; transition: all 0.2s;
    font-family: 'Poppins', sans-serif;
  }
  .filter-btn.active {
    background: linear-gradient(90deg, var(--midnight) 0%, var(--navy) 100%); border-color: var(--midnight); color: var(--pale-blue);
  }
  /* MENU GRID */
  .menu-wrapper { max-width: 1200px; margin: 0 auto; padding: 0 32px 80px; }
  .category-section { margin-bottom: 40px; }
  .category-title {
    font-family: 'Poppins', sans-serif; font-size: 22px;
    font-weight: 700; margin-bottom: 16px;
    display: flex; align-items: center; gap: 10px;
  }
  .category-title::after {
    content: ''; flex: 1; height: 1px;
    background: var(--border);
  }
  .items-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }
  .item-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    position: relative;
    transition: transform 0.2s, border-color 0.2s;
  }
  .item-img-zone {
    width: 100%; height: 120px;
    background: var(--image-bg);
    border-radius: 8px;
    margin-bottom: 14px;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    border: 1px solid var(--border);
    position: relative;
  }
  .item-img-zone img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .item-img-placeholder {
    font-size: 13px; font-weight: 600;
    color: var(--muted); letter-spacing: 0.04em;
    text-transform: uppercase;
    text-align: center;
    padding: 0 12px;
  }

/* ── Card text ── */
.item-name {
  font-family: 'Poppins', sans-serif;
  font-size: 15px; font-weight: 700;
  margin-bottom: 2px; line-height: 1.3;
}
.item-cat-label {
  font-size: 12px; color: var(--muted);
  font-weight: 400; margin-bottom: 12px;
}
.item-price {
  font-family: 'Poppins', sans-serif;
  font-size: 28px; font-weight: 800;
  color: var(--ink); margin-bottom: 16px;
  line-height: 1;
}
.item-price-sub { font-size: 13px; font-weight: 400; color: var(--muted); }

/* ── Card actions ── */
.item-actions { display: flex; gap: 8px; }

.add-btn {
  flex: 1; padding: 9px 14px;
  background: var(--ink); color: #FFF;
  border: none; border-radius: 8px;
  font-family: 'Poppins', sans-serif;
  font-size: 13px; font-weight: 600;
  cursor: pointer; transition: background 0.15s, transform 0.1s;
  text-align: center;
}
.add-btn:hover { background: #2D2926; transform: translateY(-1px); }

.qty-ctrl { display: flex; align-items: center; gap: 0; width: 100%; border: 1.5px solid var(--border); border-radius: 8px; overflow: hidden; }
.qty-btn {
  width: 38px; height: 38px;
  background: var(--cream); color: var(--ink);
  border: none; font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
  font-family: 'Poppins', sans-serif; flex-shrink: 0;
}
.qty-btn:hover { background: var(--border); }
.qty-num { flex: 1; text-align: center; font-size: 15px; font-weight: 700; }
  .item-card:hover { transform: translateY(-3px); border-color: rgba(0,121,121,0.38); }
  .item-card.unavailable { opacity: 0.5; }
  .item-emoji {
    font-size: 40px; margin-bottom: 12px; display: block;
  }
  .item-name {
    font-family: 'Poppins', sans-serif; font-size: 16px;
    font-weight: 700; margin-bottom: 6px;
  }
  .item-desc { color: var(--muted); font-size: 13px; line-height: 1.5; margin-bottom: 16px; }
  .item-footer { display: flex; align-items: center; justify-content: space-between; }
  .item-price {
    font-family: 'Poppins', sans-serif; font-size: 20px;
    font-weight: 800; color: var(--gold);
  }
  .item-price span { font-size: 13px; font-weight: 400; color: var(--muted); }
  .add-btn {
    background: var(--midnight); color: var(--pale-blue);
    border: none; border-radius: 8px;
    width: 36px; height: 36px; font-size: 20px;
    cursor: pointer; transition: opacity 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  .add-btn:hover { opacity: 0.85; }
  .qty-ctrl {
    display: flex; align-items: center; gap: 8px;
  }
  .qty-btn {
    background: rgba(36,177,177,0.12); color: var(--text);
    border: none; border-radius: 6px;
    width: 30px; height: 30px; font-size: 16px;
    cursor: pointer; transition: background 0.2s;
  }
  .qty-btn:hover { background: rgba(36,177,177,0.22); }
  .qty-num { font-weight: 700; min-width: 20px; text-align: center; }
  .badge-unavail {
    position: absolute; top: 12px; right: 12px;
    background: rgba(255, 224, 197, 0.9); color: #007979;
    font-size: 11px; padding: 3px 8px; border-radius: 20px;
    font-weight: 600;
  }
  /* CART SIDEBAR */
  .cart-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    z-index: 200; display: none;
    backdrop-filter: blur(4px);
  }
  .cart-sidebar {
    position: fixed; right: 0; top: 0; bottom: 0;
    width: 400px; background: var(--card);
    z-index: 201; padding: 0;
    transform: translateX(100%);
    transition: transform 0.3s ease;
    display: flex; flex-direction: column;
  }
  .cart-sidebar.open { transform: translateX(0); }
  .cart-overlay.open { display: block; }
  .cart-header {
    padding: 24px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .cart-header h3 { font-family: 'Poppins', sans-serif; font-size: 20px; font-weight: 700; }
  .close-btn { background: none; border: none; color: var(--muted); font-size: 24px; cursor: pointer; }
  .cart-items { flex: 1; overflow-y: auto; padding: 16px 24px; }
  .cart-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 0; border-bottom: 1px solid var(--border);
  }
  .cart-item-info { flex: 1; }
  .cart-item-name { font-size: 14px; font-weight: 600; }
  .cart-item-price { color: var(--gold); font-size: 13px; margin-top: 2px; }
  .cart-footer { padding: 24px; border-top: 1px solid var(--border); }
  .cart-total {
    display: flex; justify-content: space-between;
    font-family: 'Poppins', sans-serif; font-size: 18px;
    font-weight: 700; margin-bottom: 16px;
  }
  .cart-total span:last-child { color: var(--gold); }
  .notes-input {
    width: 100%; padding: 10px 14px;
    background: var(--input-bg); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-family: 'Poppins', sans-serif;
    font-size: 13px; outline: none; resize: none; margin-bottom: 12px;
  }
  .payment-select {
    width: 100%; padding: 10px 14px;
    background: var(--input-bg); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-family: 'Poppins', sans-serif;
    font-size: 13px; outline: none; margin-bottom: 16px;
    appearance: none; cursor: pointer;
  }
  .place-btn {
    width: 100%; padding: 15px; background: linear-gradient(90deg, var(--midnight) 0%, var(--navy) 100%); color: var(--pale-blue);
    border: none; border-radius: 10px;
    font-family: 'Poppins', sans-serif; font-size: 16px;
    font-weight: 700; cursor: pointer; transition: opacity 0.2s;
  }
  .place-btn:hover { opacity: 0.9; }
  .empty-cart { text-align: center; padding: 40px 20px; color: var(--muted); }
  .empty-cart .icon { font-size: 48px; margin-bottom: 12px; }
  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--midnight); color: var(--pale-blue);
    padding: 12px 24px; border-radius: 12px;
    font-size: 14px; font-weight: 500;
    border: 1px solid rgba(255, 224, 197, 0.6);
    z-index: 300; display: none;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  .toast.success { border-color: rgba(255, 224, 197, 0.8); }
  @media (max-width: 600px) {
    .cart-sidebar { width: 100%; }
    nav { padding: 0 16px; }
    .nav-actions { gap: 8px; }
    .theme-toggle { min-width: auto; padding: 7px 10px; }
    .hero, .filters, .menu-wrapper { padding-left: 16px; padding-right: 16px; }
    .hero h1 { font-size: 26px; }
  }
</style>
</head>
<body>
<nav>
  <div class="nav-brand">Campus <span>Canteen</span></div>
  <div class="nav-actions">
    <button class="theme-toggle" id="themeToggle" type="button" onclick="toggleTheme()">Dark</button>
    <a href="/orders" class="nav-link">My Orders</a>
    <a href="/logout" class="nav-link">Sign Out</a>
    <button class="cart-btn" onclick="openCart()">
      Cart <span class="cart-count" id="cartCount">0</span>
    </button>
  </div>
</nav>

<div class="hero">
  <h1>What are you <span>hungry</span> for today?</h1>
  <p>Fresh meals prepared daily • Order now, pick up in minutes</p>
</div>

<div class="filters" id="filterBar">
  <button class="filter-btn active" onclick="filterCat('All', this)">All</button>
</div>

<div class="menu-wrapper" id="menuWrapper">
  <div style="text-align:center;padding:60px;color:var(--muted)">Loading menu...</div>
</div>

<!-- Cart Sidebar -->
<div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>
<div class="cart-sidebar" id="cartSidebar">
  <div class="cart-header">
    <h3>Your Cart</h3>
    <button class="close-btn" onclick="closeCart()">✕</button>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-footer" id="cartFooter" style="display:none">
    <div class="cart-total">
      <span>Total</span>
      <span id="cartTotal">₹0</span>
    </div>
    <textarea class="notes-input" id="orderNotes" placeholder="Special instructions (optional)..." rows="2"></textarea>
    <select class="payment-select" id="paymentMethod">
      <option value="cash">Pay at Counter</option>
      <option value="upi">UPI</option>
      <option value="card">Card</option>
    </select>
    <button class="place-btn" onclick="placeOrder()">Place Order →</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let cart = {};
let menuData = [];
const ITEM_IMAGES = {
  'Aloo Paratha': 'Aloo-Paratha.webp',
  'Poha': 'Poha.webp',
  'Idli Sambar': 'Idli-Sambar.webp',
  'Dal Rice': 'Dal-Chawal.webp',
  'Rajma Chawal': 'Rajma Chawal.webp',
  'Veg Thali': 'Veg-Thali.webp',
  'Chicken Biryani': 'Chicken Biryani.webp',
  'Samosa (2 pcs)': 'Samosa.webp',
  'Bread Pakora': 'Bread-Pakora.webp',
  'Maggi Noodles': 'maggi.webp',
  'Masala Chai': 'Masala Chai.webp',
  'Cold Coffee': 'Cold-Coffee.webp',
  'Lassi': 'Lassi.webp',
  'Gulab Jamun': 'gulab-jamun.webp',
  'Ice Cream': 'Ice Cream.webp'
};

function setTheme(theme) {
  document.documentElement.dataset.theme = theme;
  localStorage.setItem('customerTheme', theme);
  const btn = document.getElementById('themeToggle');
  if (btn) btn.textContent = theme === 'dark' ? 'Light' : 'Dark';
}

function toggleTheme() {
  const current = document.documentElement.dataset.theme || 'light';
  setTheme(current === 'dark' ? 'light' : 'dark');
}

async function loadMenu() {
  const res = await fetch('/api/menu');
  menuData = await res.json();
  renderFilters();
  renderMenu(menuData);
}

function renderFilters() {
  const bar = document.getElementById('filterBar');
  bar.innerHTML = '<button class="filter-btn active" onclick="filterCat(\'All\', this)">All</button>';
  menuData.forEach(cat => {
    bar.innerHTML += `<button class="filter-btn" onclick="filterCat('${cat.category}', this)">${cat.category}</button>`;
  });
}

function filterCat(cat, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const filtered = cat === 'All' ? menuData : menuData.filter(c => c.category === cat);
  renderMenu(filtered);
}

function renderMenu(data) {
  const wrapper = document.getElementById('menuWrapper');
  if (!data.length) { wrapper.innerHTML = '<div style="text-align:center;padding:60px;color:var(--muted)">No items found</div>'; return; }
  wrapper.innerHTML = data.map(cat => `
    <div class="category-section" id="cat-${cat.category}">
      <div class="category-title">${cat.category}</div>
      <div class="items-grid">
        ${cat.items.map(item => renderItem(item)).join('')}
      </div>
    </div>`).join('');
}

function renderItem(item) {
  const itemId = jsArg(item.id);
  const inCart = cart[item.id] || 0;
  const imageName = ITEM_IMAGES[item.name];
  const imageMarkup = imageName
    ? `<img src="/menu-items/${encodeURIComponent(imageName)}" alt="${item.name}" loading="lazy">`
    : `<span class="item-img-placeholder">${item.name}</span>`;
  const ctrl = inCart > 0
    ? `<div class="qty-ctrl">
        <button class="qty-btn" onclick="changeQty(${itemId},-1);renderCartSidebar()">−</button>
        <span class="qty-num">${inCart}</span>
        <button class="qty-btn" onclick="changeQty(${itemId},1);renderCartSidebar()">+</button>
       </div>`
    : `<div class="item-actions"><button class="add-btn" onclick="changeQty(${itemId},1)">Add to order</button></div>`;
  return `
    <div class="item-card ${!item.available ? 'unavailable' : ''}" id="item-${item.id}">
      ${!item.available ? '<span class="badge-unavail">Unavailable</span>' : ''}
      <div class="item-img-zone">
        ${imageMarkup}
      </div>
      <div class="item-name">${item.name}</div>
      <div class="item-cat-label">${item.category || ''}</div>
      <div class="item-price">₹${item.price} <span class="item-price-sub">/ item</span></div>
      ${item.available
        ? ctrl
        : '<span style="font-size:13px;color:var(--muted)">Not available</span>'}
    </div>`;
}

function changeQty(id, delta) {
  id = String(id);
  cart[id] = Math.max(0, (cart[id] || 0) + delta);
  if (cart[id] === 0) delete cart[id];
  updateCartCount();

  const allItems = menuData.flatMap(c => c.items);
  const item = allItems.find(i => i.id === id);
  if (item) {
    const el = document.getElementById(`item-${id}`);
    if (el) {
      el.outerHTML = renderItem(item);
    }
  }
}

function jsArg(value) {
  return JSON.stringify(String(value)).replace(/"/g, '&quot;');
}

function updateCartCount() {
  const total = Object.values(cart).reduce((a, b) => a + b, 0);
  document.getElementById('cartCount').textContent = total;
}

function openCart() {
  document.getElementById('cartOverlay').classList.add('open');
  document.getElementById('cartSidebar').classList.add('open');
  renderCartSidebar();
}

function closeCart() {
  document.getElementById('cartOverlay').classList.remove('open');
  document.getElementById('cartSidebar').classList.remove('open');
}

function renderCartSidebar() {
  const allItems = menuData.flatMap(c => c.items);
  const itemsEl = document.getElementById('cartItems');
  const footer = document.getElementById('cartFooter');
  const keys = Object.keys(cart);
  if (!keys.length) {
    itemsEl.innerHTML = `<div class="empty-cart"><p>Your cart is empty</p></div>`;
    footer.style.display = 'none';
    return;
  }
  let total = 0;
  itemsEl.innerHTML = keys.map(id => {
    const item = allItems.find(i => i.id == id);
    if (!item) return '';
    const subtotal = item.price * cart[id];
    total += subtotal;
    return `<div class="cart-item">
      <div class="cart-item-info">
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-price">₹${item.price} × ${cart[id]} = ₹${subtotal}</div>
      </div>
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="changeQty(${jsArg(id)}, -1); renderCartSidebar()">−</button>
        <span class="qty-num">${cart[id]}</span>
        <button class="qty-btn" onclick="changeQty(${jsArg(id)}, 1); renderCartSidebar()">+</button>
      </div>
    </div>`;
  }).join('');
  document.getElementById('cartTotal').textContent = `₹${total}`;
  footer.style.display = 'block';
}

async function placeOrder() {
  const items = Object.entries(cart).map(([id, qty]) => ({id, quantity: qty}));
  const notes = document.getElementById('orderNotes').value;
  const payment = document.getElementById('paymentMethod').value;
  const res = await fetch('/api/orders', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({items, notes, payment_method: payment})
  });
  const data = await res.json();
  if (data.success) {
    cart = {};
    updateCartCount();
    closeCart();
    showToast(`Order #${data.order_id} placed! Total: ₹${data.total}`);
  } else {
    showToast(data.message);
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3500);
}

setTheme(localStorage.getItem('customerTheme') || document.documentElement.dataset.theme || 'light');
loadMenu();
</script>
