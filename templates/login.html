<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campus Canteen — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --midnight: #000000;
    --navy: #233d4d;
    --soft-blue: #fe7f2d;
    --pale-blue: #aecf0f;

    --saffron: var(--soft-blue);
    --deep: var(--midnight);
    --card: var(--navy);
    --gold: var(--pale-blue);
    --mint: var(--soft-blue);
    --text: #f5f7fb;
    --muted: #8ea0b0;
    --success: var(--pale-blue);
    --error: #FF6B6B;
  }
  body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, var(--midnight) 0%, var(--navy) 100%);
    min-height: 100vh;
    display: flex;
    color: var(--text);
    overflow: hidden;
  }
  .left-panel {
    flex: 1;
    background: linear-gradient(135deg, var(--soft-blue) 0%, var(--pale-blue) 45%, var(--navy) 100%);
    background-size: 200% 200%;
    animation: gradShift 6s ease infinite;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 60px;
    position: relative;
    overflow: hidden;
  }
  @keyframes gradShift {
    0%,100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }
  .left-panel::before {
    content: '';
    position: absolute;
    width: 400px; height: 400px;
    background: rgba(255,255,255,0.08);
    border-radius: 50%;
    top: -100px; right: -100px;
  }
  .left-panel::after {
    content: '';
    position: absolute;
    width: 300px; height: 300px;
    background: rgba(255,255,255,0.06);
    border-radius: 50%;
    bottom: -80px; left: -60px;
  }
  .brand { position: relative; z-index: 1; text-align: center; color: #1A1A2E; }
  .brand-icon { font-size: 80px; margin-bottom: 20px; display: block; }
  .brand h1 { font-family: 'Poppins', sans-serif; font-size: 42px; font-weight: 800; line-height: 1.1; }
  .brand p { font-size: 18px; margin-top: 12px; opacity: 0.8; font-weight: 500; }
  .floating-items { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; }
  .float-item { position: absolute; font-size: 32px; animation: floatAnim 4s ease-in-out infinite; opacity: 0.3; }
  .float-item:nth-child(1) { top: 15%; left: 10%; animation-delay: 0s; }
  .float-item:nth-child(2) { top: 70%; left: 20%; animation-delay: 1s; }
  .float-item:nth-child(3) { top: 30%; right: 15%; animation-delay: 2s; }
  .float-item:nth-child(4) { bottom: 20%; right: 10%; animation-delay: 0.5s; }
  @keyframes floatAnim {
    0%,100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-20px) rotate(10deg); }
  }
  .right-panel {
    width: 480px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
    background: var(--deep);
  }
  .auth-box { width: 100%; max-width: 380px; }
  .tab-switcher {
    display: flex;
    background: var(--card);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 32px;
  }
  .tab-btn {
    flex: 1;
    padding: 10px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: 'Poppins', sans-serif;
    font-size: 15px;
    font-weight: 600;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab-btn.active {
    background: linear-gradient(90deg, var(--soft-blue) 0%, var(--pale-blue) 100%);
    color: white;
  }
  .form-group { margin-bottom: 20px; }
  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .form-group input {
    width: 100%;
    padding: 14px 16px;
    background: var(--card);
    border: 1.5px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    color: var(--text);
    font-size: 15px;
    font-family: 'Poppins', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus { border-color: var(--saffron); }
  .btn-primary {
    width: 100%;
    padding: 15px;
    background: linear-gradient(90deg, var(--soft-blue) 0%, var(--pale-blue) 100%);
    color: white;
    border: none;
    border-radius: 10px;
    font-family: 'Poppins', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    margin-top: 8px;
  }
  .btn-primary:hover { opacity: 0.92; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }
  .error-msg {
    background: rgba(255,107,107,0.15);
    border: 1px solid var(--error);
    color: var(--error);
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 14px;
    margin-top: 16px;
    display: none;
  }
  .hint {
    text-align: center;
    margin-top: 24px;
    font-size: 13px;
    color: var(--muted);
  }
  .hint span {
    background: var(--card);
    padding: 8px 14px;
    border-radius: 8px;
    display: inline-block;
  }
  h2 { font-family: 'Poppins', sans-serif; font-size: 28px; font-weight: 700; margin-bottom: 8px; }
  .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 32px; }
  @media (max-width: 768px) {
    .left-panel { display: none; }
    .right-panel { width: 100%; }
  }
</style>
</head>
<body>
<div class="left-panel">
  <div class="floating-items">
    <span class="float-item">🍛</span>
    <span class="float-item">☕</span>
    <span class="float-item">🥘</span>
    <span class="float-item">🧆</span>
  </div>
  <div class="brand">
    <span class="brand-icon">🍽️</span>
    <h1>Campus Canteen</h1>
    <p>Fresh food, fast orders,<br>zero queues.</p>
  </div>
</div>
<div class="right-panel">
  <div class="auth-box">
    <div class="tab-switcher">
      <button class="tab-btn active" id="loginTab" onclick="switchTab('login')">Sign In</button>
      <button class="tab-btn" id="registerTab" onclick="switchTab('register')">Register</button>
    </div>

    <!-- Login Form -->
    <div id="loginForm">
      <h2>Welcome back 👋</h2>
      <p class="subtitle">Sign in to your canteen account</p>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="loginEmail" placeholder="you@college.edu">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••">
      </div>
      <button class="btn-primary" onclick="doLogin()">Sign In →</button>
      <div class="error-msg" id="loginError"></div>
      <div class="hint">
        <span>Demo: <strong>student@canteen.com</strong> / student123<br>Admin: <strong>admin@canteen.com</strong> / admin123</span>
      </div>
    </div>

    <!-- Register Form -->
    <div id="registerForm" style="display:none">
      <h2>Join the canteen 🎉</h2>
      <p class="subtitle">Create your student account</p>
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="regName" placeholder="Your full name">
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="regEmail" placeholder="you@college.edu">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="regPassword" placeholder="Min. 6 characters">
      </div>
      <button class="btn-primary" onclick="doRegister()">Create Account →</button>
      <div class="error-msg" id="registerError"></div>
    </div>
  </div>
</div>

<script>
function switchTab(tab) {
  document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
  document.getElementById('loginTab').classList.toggle('active', tab === 'login');
  document.getElementById('registerTab').classList.toggle('active', tab === 'register');
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  if (!email || !password) { showError(errEl, 'Please fill in all fields'); return; }
  const res = await fetch('/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({email, password})
  });
  const data = await res.json();
  if (data.success) {
    window.location.href = data.role === 'admin' ? '/admin' : '/menu';
  } else {
    showError(errEl, data.message || 'Login failed');
  }
}

async function doRegister() {
  const name = document.getElementById('regName').value;
  const email = document.getElementById('regEmail').value;
  const password = document.getElementById('regPassword').value;
  const errEl = document.getElementById('registerError');
  if (!name || !email || !password) { showError(errEl, 'Please fill in all fields'); return; }
  if (password.length < 6) { showError(errEl, 'Password must be at least 6 characters'); return; }
  const res = await fetch('/register', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({name, email, password})
  });
  const data = await res.json();
  if (data.success) {
    window.location.href = '/menu';
  } else {
    showError(errEl, data.message || 'Registration failed');
  }
}

function showError(el, msg) {
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 4000);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const active = document.getElementById('loginForm').style.display !== 'none';
    if (active) doLogin(); else doRegister();
  }
});
</script>
</body>
</html>
