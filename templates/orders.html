<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Orders — Campus Canteen</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script>
  (function () {
    const savedTheme = localStorage.getItem('customerTheme') || 'light';
    document.documentElement.dataset.theme = savedTheme;
  })();
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --midnight: #007979;
    --navy: #24b1b1;
    --soft-blue: #ffe0c5;
    --pale-blue: #fff0e4;

    --saffron: var(--soft-blue);
    --deep: var(--midnight);
    --card: #fff0e4;
    --card2: #ffe0c5;
    --gold: #007979;
    --mint: #24b1b1;
    --text: #083f3f;
    --muted: #4f7777;
    --border: rgba(0, 121, 121, 0.18);
    --page-bg: linear-gradient(135deg, var(--pale-blue) 0%, var(--soft-blue) 100%);
    --nav-text: rgba(255, 240, 228, 0.82);
  }
  [data-theme="dark"] {
    --midnight: #000000;
    --navy: #233d4d;
    --soft-blue: #fe7f2d;
    --pale-blue: #aecf0f;
    --saffron: var(--soft-blue);
    --deep: var(--midnight);
    --card: var(--navy);
    --card2: #2e5065;
    --gold: var(--pale-blue);
    --mint: var(--soft-blue);
    --text: #f5f7fb;
    --muted: #aeb9c4;
    --border: rgba(174, 207, 15, 0.22);
    --page-bg: linear-gradient(135deg, var(--midnight) 0%, var(--navy) 100%);
    --nav-text: rgba(245, 247, 251, 0.82);
  }
  body { font-family: 'Poppins', sans-serif; background: var(--page-bg); color: var(--text); min-height: 100vh; }
  nav {
    background: linear-gradient(90deg, var(--midnight) 0%, var(--navy) 100%); backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border); padding: 0 32px; height: 64px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .nav-brand { font-family: 'Poppins', sans-serif; font-size: 20px; font-weight: 800; }
  .nav-brand span { color: var(--soft-blue); }
  .nav-link {
    color: var(--nav-text); font-size: 14px; font-weight: 500;
    text-decoration: none; padding: 6px 12px; border-radius: 8px; transition: all 0.2s;
  }
  .nav-link:hover { color: #fff; background: rgba(255,255,255,0.12); }
  .nav-actions { display:flex; align-items:center; gap:8px; }
  .theme-toggle {
    border: 1px solid rgba(255,255,255,0.22);
    background: rgba(255,255,255,0.12);
    color: #fff;
    border-radius: 999px;
    padding: 7px 12px;
    cursor: pointer;
    font-family: 'Poppins', sans-serif;
    font-size: 13px;
    font-weight: 600;
    min-width: 86px;
    transition: background 0.2s, border-color 0.2s;
  }
  .theme-toggle:hover { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.38); }
  .main { max-width: 800px; margin: 0 auto; padding: 40px 24px; }
  h1 { font-family: 'Poppins', sans-serif; font-size: 32px; font-weight: 800; margin-bottom: 8px; }
  .subtitle { color: var(--muted); margin-bottom: 32px; }
  .order-card {
    background: var(--card); border-radius: 16px;
    border: 1px solid var(--border); margin-bottom: 16px;
    overflow: hidden; transition: border-color 0.2s;
  }
  .order-card:hover { border-color: rgba(255,107,53,0.25); }
  .order-header {
    padding: 20px 24px;
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer;
  }
  .order-id { font-family: 'Poppins', sans-serif; font-size: 16px; font-weight: 700; }
  .order-meta { color: var(--muted); font-size: 13px; margin-top: 3px; }
  .order-right { text-align: right; }
  .order-total { font-family: 'Poppins', sans-serif; font-size: 18px; font-weight: 700; color: var(--soft-blue); }
  .status-badge {
    display: inline-block; padding: 4px 12px; border-radius: 20px;
    font-size: 12px; font-weight: 600; margin-top: 4px;
  }
  .status-pending { background: rgba(247,201,72,0.15); color: var(--gold); }
  .status-preparing { background: rgba(255,107,53,0.15); color: var(--saffron); }
  .status-ready { background: rgba(78,205,196,0.15); color: var(--mint); }
  .status-completed { background: rgba(100,200,100,0.15); color: #6dc96d; }
  .status-cancelled { background: rgba(255,107,107,0.15); color: #FF6B6B; }
  .order-details { padding: 0 24px 20px; border-top: 1px solid var(--border); display: none; }
  .order-details.open { display: block; }
  .detail-item {
    display: flex; justify-content: space-between;
    padding: 8px 0; font-size: 14px; border-bottom: 1px solid var(--border);
  }
  .detail-item:last-child { border-bottom: none; }
  .detail-item span:first-child { color: var(--muted); }
  .progress-bar {
    display: flex; align-items: center; gap: 4px;
    margin: 16px 0 20px;
  }
  .prog-step {
    flex: 1; height: 4px; border-radius: 2px;
    background: var(--border);
    transition: background 0.3s;
  }
  .prog-step.done { background: var(--saffron); }
  .prog-step.active { background: var(--gold); }
  .prog-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .empty { text-align: center; padding: 80px 20px; color: var(--muted); }
  .empty .icon { font-size: 60px; margin-bottom: 16px; }
  .empty a { color: var(--soft-blue); text-decoration: none; font-weight: 600; }
  @media (max-width: 600px) {
    nav { padding: 0 16px; }
    .theme-toggle { min-width: auto; padding: 7px 10px; }
  }
</style>
</head>
<body>
<nav>
  <div class="nav-brand">Campus <span>Canteen</span></div>
  <div class="nav-actions">
    <button class="theme-toggle" id="themeToggle" type="button" onclick="toggleTheme()">Dark</button>
    <a href="/menu" class="nav-link">← Menu</a>
    <a href="/logout" class="nav-link">Sign Out</a>
  </div>
</nav>
<div class="main">
  <h1>My Orders</h1>
  <p class="subtitle">Track your current and past orders</p>
  <div id="ordersContainer">
    <div style="text-align:center;padding:40px;color:var(--muted)">Loading...</div>
  </div>
</div>
<script>
const STATUS_STEPS = { pending: 0, preparing: 1, ready: 2, completed: 3 };
const STATUS_LABELS = ['Ordered', 'Preparing', 'Ready', 'Done'];

function setTheme(theme) {
  document.documentElement.dataset.theme = theme;
  localStorage.setItem('customerTheme', theme);
  const btn = document.getElementById('themeToggle');
  if (btn) btn.textContent = theme === 'dark' ? 'Light' : 'Dark';
}

function toggleTheme() {
  const current = document.documentElement.dataset.theme || 'light';
  setTheme(current === 'dark' ? 'light' : 'dark');
}

async function loadOrders() {
  const res = await fetch('/api/orders/my');
  const orders = await res.json();
  const container = document.getElementById('ordersContainer');
  if (!orders.length) {
    container.innerHTML = `<div class="empty">
      <p>No orders yet</p>
      <p style="margin-top:8px"><a href="/menu">Browse the menu</a> and place your first order!</p>
    </div>`;
    return;
  }
  container.innerHTML = orders.map(o => renderOrder(o)).join('');
}

function renderOrder(o) {
  const orderId = jsArg(o.id);
  const step = STATUS_STEPS[o.status] ?? -1;
  const progressHtml = o.status !== 'cancelled' ? `
    <div class="prog-labels">${STATUS_LABELS.map(l => `<span>${l}</span>`).join('')}</div>
    <div class="progress-bar">
      ${[0,1,2,3].map(i => `<div class="prog-step ${i < step ? 'done' : i === step ? 'active' : ''}"></div>`).join('')}
    </div>` : '';
  return `<div class="order-card">
    <div class="order-header" onclick="toggle(${orderId})">
      <div>
        <div class="order-id">Order #${o.id}</div>
        <div class="order-meta">${o.created_at} • ${o.payment_method.toUpperCase()}</div>
      </div>
      <div class="order-right">
        <div class="order-total">₹${o.total}</div>
        <span class="status-badge status-${o.status}">${o.status.charAt(0).toUpperCase()+o.status.slice(1)}</span>
      </div>
    </div>
    <div class="order-details" id="detail-${o.id}">
      ${progressHtml}
      ${o.items.map(i => `<div class="detail-item"><span>${i.name} × ${i.quantity}</span><span>₹${i.price * i.quantity}</span></div>`).join('')}
      ${o.notes ? `<div style="margin-top:12px;font-size:13px;color:var(--muted)">Note: ${o.notes}</div>` : ''}
    </div>
  </div>`;
}

function toggle(id) {
  const el = document.getElementById(`detail-${id}`);
  el.classList.toggle('open');
}

function jsArg(value) {
  return JSON.stringify(String(value)).replace(/"/g, '&quot;');
}

setTheme(localStorage.getItem('customerTheme') || document.documentElement.dataset.theme || 'light');
loadOrders();
setInterval(loadOrders, 15000); // auto-refresh
</script>
</body>
</html>
